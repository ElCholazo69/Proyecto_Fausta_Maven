name: CI - Control de Calidad de la Pasteleria

on:
  push:
    branches: [ "master" ]

jobs:
  control-calidad:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    # CI-01 (Parte A): Validador nativo de HTML instalado vía npm
    - name: CI-01 - Validar estructura y etiquetas HTML
      run: |
        sudo npm install -g htmlhint
        htmlhint "src/main/webapp/html/**/*.html"

    # CI-01 (Parte B): Validador exclusivo de CSS listo e independiente
    - name: CI-01 - Validar hojas de estilo CSS con Stylelint
      run: |
        # 1. Instalamos dependencias
        npm install stylelint stylelint-config-standard --save-dev
        
        # 2. Creamos la configuración relajando las reglas estrictas
        echo '{
          "extends": "stylelint-config-standard",
          "rules": {
            "selector-class-pattern": null,
            "selector-id-pattern": null,
            "font-family-name-quotes": null,
            "font-family-no-missing-generic-family-keyword": null,
            "comment-whitespace-inside": null,
            "rule-empty-line-before": null,
            "color-function-alias-notation": null,
            "color-function-notation": null,
            "alpha-value-notation": null,
            "media-feature-range-notation": null,
            "declaration-empty-line-before": null
          }
        }' > .stylelintrc.json
        
        # 3. Ejecutamos la validación enfocada solo en errores reales
        npx stylelint "src/main/webapp/css/**/*.css"

    # CI-02: Comando seguro para verificar presencia de JavaScript
    - name: CI-02 - Verificar presencia de archivos JavaScript
      run: |
        echo "Analizando la interactividad del Frontend..."
        ls src/main/webapp/js