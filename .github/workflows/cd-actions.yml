name: CD - Despliegue de la Interfaz

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true
  
jobs:
  despliegue-frontend:
    runs-on: ubuntu-latest
    
    # NECESARIO PARA EL DESPLIEGUE EN GITHUB PAGES
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps: # Los pasos siguen aquí abajo 
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Inicializar entorno de GitHub Pages
      uses: actions/configure-pages@v4

    - name: Empaquetar archivos de la interfaz
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'src/main/webapp/'

    - name: CD-03 - Publicar Frontend en GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4